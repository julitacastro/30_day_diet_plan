services:
  - type: web
    name: jhuls-health-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jhuls-db
          property: connectionString

databases:
  - name: jhuls-db
    plan: free
