<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhuls — My Nourishment Plan 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF8F2;
    --warm-white: #FEFCF9;
    --brown-deep: #3D2B1F;
    --brown-mid: #6B4A35;
    --brown-light: #A67C5B;
    --terracotta: #C4704A;
    --terracotta-light: #E8A882;
    --sage: #7A9E7E;
    --sage-light: #B8D4BA;
    --sage-pale: #EDF5EE;
    --gold: #C9954A;
    --gold-pale: #FBF0DE;
    --blush: #E8C4B0;
    --text-dark: #2C1A0E;
    --text-mid: #6B4A35;
    --text-muted: #A67C5B;
    --border: rgba(166,124,91,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(196,112,74,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(122,158,126,0.07) 0%, transparent 50%);
  }

  /* --- HEADER --- */
  .site-header {
    text-align: center;
    padding: 3rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(196,112,74,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .greeting {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 0.5rem;
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--brown-deep);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .site-title em {
    font-style: italic;
    color: var(--terracotta);
  }
  .site-sub {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 300;
    margin-bottom: 2rem;
  }

  /* --- TODAY PILL --- */
  .today-banner {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--brown-deep);
    color: var(--cream);
    padding: 0.5rem 1.25rem;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 2rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .today-banner:hover { background: var(--terracotta); }
  .today-dot { width: 8px; height: 8px; background: var(--terracotta-light); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* --- NAV MONTH TABS --- */
  .month-nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    padding: 0 1rem;
    margin-bottom: 0.5rem;
  }
  .week-tab {
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 50px;
    font-size: 0.78rem;
    cursor: pointer;
    background: var(--warm-white);
    color: var(--text-muted);
    transition: all 0.2s;
    font-weight: 500;
  }
  .week-tab:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .week-tab.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }

  /* --- DAY GRID --- */
  .day-grid-wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 2rem;
  }
  .week-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--brown-light);
    margin: 1.5rem 0 0.75rem;
    font-style: italic;
  }
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 0.5rem;
  }
  .day-chip {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.55rem 0.3rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .day-chip:hover { border-color: var(--terracotta); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(196,112,74,0.15); }
  .day-chip.active {
    background: var(--brown-deep);
    border-color: var(--brown-deep);
    color: white;
    box-shadow: 0 6px 20px rgba(61,43,31,0.25);
    transform: translateY(-2px);
  }
  .day-chip.today-chip { border-color: var(--terracotta); }
  .day-chip.today-chip::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px;
    background: var(--terracotta);
    border-radius: 50%;
  }
  .day-chip.active.today-chip::after { background: var(--terracotta-light); }
  .chip-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1;
  }
  .chip-name {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.6;
    margin-top: 3px;
  }
  .chip-emoji { font-size: 0.85rem; margin-top: 2px; }

  /* --- MAIN CONTENT AREA --- */
  .content-area {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  /* --- DAY HERO --- */
  .day-hero {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem 2rem 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .day-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(196,112,74,0.1) 0%, transparent 70%);
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .hero-date-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .hero-day-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    color: var(--brown-deep);
    line-height: 1;
  }
  .hero-day-name em { font-style: italic; color: var(--terracotta); }
  .hero-focus {
    background: var(--gold-pale);
    border: 1px solid rgba(201,149,74,0.25);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    min-width: 160px;
    text-align: right;
    flex-shrink: 0;
  }
  .focus-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 4px; }
  .focus-text { font-size: 0.88rem; font-weight: 500; color: var(--brown-deep); }

  /* Nutrient pills row */
  .nutrient-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.25rem;
  }
  .npill {
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 0.72rem;
    font-weight: 500;
    border: 1px solid;
  }
  .npill-green { background: var(--sage-pale); color: var(--sage); border-color: rgba(122,158,126,0.3); }
  .npill-terr { background: rgba(232,168,130,0.2); color: var(--terracotta); border-color: rgba(196,112,74,0.25); }
  .npill-gold { background: var(--gold-pale); color: var(--gold); border-color: rgba(201,149,74,0.25); }

  /* --- MEAL CARDS --- */
  .meals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 560px) { .meals-grid { grid-template-columns: 1fr; } }

  .meal-card {
    border-radius: 18px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }
  .meal-card.breakfast { background: linear-gradient(135deg, #FBF0DE 0%, #FDF8F2 100%); border: 1px solid rgba(201,149,74,0.2); }
  .meal-card.lunch     { background: linear-gradient(135deg, #EDF5EE 0%, #FDF8F2 100%); border: 1px solid rgba(122,158,126,0.2); }
  .meal-card.snack     { background: linear-gradient(135deg, rgba(232,168,130,0.15) 0%, #FDF8F2 100%); border: 1px solid rgba(196,112,74,0.2); }
  .meal-card.dinner    { background: linear-gradient(135deg, rgba(61,43,31,0.05) 0%, #FDF8F2 100%); border: 1px solid rgba(61,43,31,0.12); }

  .meal-type-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 50px;
    margin-bottom: 0.6rem;
  }
  .tag-b { background: var(--gold); color: white; }
  .tag-l { background: var(--sage); color: white; }
  .tag-s { background: var(--terracotta); color: white; }
  .tag-d { background: var(--brown-deep); color: var(--cream); }

  .meal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--brown-deep);
    margin-bottom: 0.6rem;
    line-height: 1.25;
  }
  .meal-items { list-style: none; }
  .meal-items li {
    font-size: 0.82rem;
    color: var(--text-mid);
    padding: 3px 0;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
    font-weight: 300;
  }
  .meal-items li::before { content: '—'; color: var(--text-muted); flex-shrink: 0; font-weight: 300; }

  /* --- TIP BOX --- */
  .tip-box {
    background: var(--sage-pale);
    border-left: 3px solid var(--sage);
    border-radius: 0 14px 14px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    animation: fadeIn 0.5s ease;
  }
  .tip-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); margin-bottom: 4px; font-weight: 500; }
  .tip-text { font-size: 0.88rem; color: var(--text-mid); line-height: 1.6; font-weight: 300; }

  /* --- WATER & COFFEE TRACKER --- */
  .habit-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 480px) { .habit-row { grid-template-columns: 1fr; } }
  .habit-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem;
  }
  .habit-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }
  .cups-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .cup-btn {
    width: 30px; height: 36px;
    border-radius: 0 0 8px 8px;
    border: 1.5px solid rgba(122,158,126,0.4);
    background: transparent;
    cursor: pointer;
    font-size: 0.7rem;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    color: var(--sage);
  }
  .cup-btn.filled { background: var(--sage); color: white; border-color: var(--sage); }
  .cup-btn:hover { border-color: var(--sage); }
  .coffee-limit {
    font-size: 0.88rem;
    color: var(--text-mid);
    font-weight: 300;
    margin-top: 4px;
  }
  .coffee-cups { display: flex; gap: 6px; margin-top: 8px; }
  .coffee-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid rgba(196,112,74,0.3);
    background: transparent;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.15s;
  }
  .coffee-btn.filled { background: var(--terracotta); border-color: var(--terracotta); }
  .coffee-note { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

  /* --- NAV ARROWS --- */
  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 0.5rem 1rem;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .day-counter {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* --- FOOTER --- */
  .site-footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 300;
  }
  .site-footer strong { color: var(--terracotta); }

  /* --- SCROLLBAR --- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 3px; }
</style>
</head>

let today = new Date();
let selectedDay = 0;
let currentMonthKey = '';
let waterFilled = {};
let coffeeFilled = {};

// ========== STORAGE HELPERS ==========
function getStorageKey(type) {
  return `jhuls_diet_${currentMonthKey}_${type}`;
}
function saveToStorage() {
  try {
    localStorage.setItem(getStorageKey('water'), JSON.stringify(waterFilled));
    localStorage.setItem(getStorageKey('coffee'), JSON.stringify(coffeeFilled));
  } catch(e) {}
}
function loadFromStorage() {
  try {
    const w = localStorage.getItem(getStorageKey('water'));
    const c = localStorage.getItem(getStorageKey('coffee'));
    waterFilled = w ? JSON.parse(w) : {};
    coffeeFilled = c ? JSON.parse(c) : {};
  } catch(e) {
    waterFilled = {}; coffeeFilled = {};
  }
}

  const existing = document.getElementById('monthSelectorBar');
  if (existing) existing.remove();

  const bar = document.createElement('div');
  bar.id = 'monthSelectorBar';
  bar.style.cssText = `
    text-align:center; padding: 0.75rem 1rem 0;
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
  `;

  const label = document.createElement('span');
  label.style.cssText = 'font-size:0.78rem; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.1em;';
  label.textContent = 'Running this plan for:';

  const sel = document.createElement('select');
  sel.id = 'monthSelect';
  sel.style.cssText = `
    font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500;
    color:var(--brown-deep); background:var(--warm-white);
    border:1px solid var(--border); border-radius:50px;
    padding:5px 14px; cursor:pointer; outline:none;
    appearance:none; -webkit-appearance:none;
  `;

  // Generate options: current month ± 6 months
  const now = new Date();
  for (let offset = -2; offset <= 6; offset++) {
    const d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const key = buildMonthKey(d.getFullYear(), d.getMonth());
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
    if (key === currentMonthKey) opt.selected = true;
    sel.appendChild(opt);
  }

  sel.addEventListener('change', () => {
    saveToStorage(); // save current before switching
    currentMonthKey = sel.value;
    loadFromStorage();
    // fix today highlight
    const parts = currentMonthKey.split('_');
    const selYear = parseInt(parts[0]);
    const selMonth = parseInt(parts[1]) - 1;
    const realNow = new Date();
    if (realNow.getFullYear() === selYear && realNow.getMonth() === selMonth) {
      today = realNow;
    } else {
      today = new Date(selYear, selMonth, 0); // no day matches → no today highlight
    }
    renderAll();
  });

  const resetBtn = document.createElement('button');
  resetBtn.textContent = '↺ Reset month';
  resetBtn.style.cssText = `
    font-family:'DM Sans',sans-serif; font-size:0.75rem;
    color:var(--text-muted); background:transparent;
    border:1px solid var(--border); border-radius:50px;
    padding:4px 12px; cursor:pointer;
  `;
  resetBtn.addEventListener('click', () => {
    if (confirm(`Reset all water & coffee tracking for ${sel.options[sel.selectedIndex].text}?\n\nThis cannot be undone.`)) {
      waterFilled = {}; coffeeFilled = {};
      saveToStorage();
      renderContent();
    }
  });

  bar.appendChild(label);
  bar.appendChild(sel);
  bar.appendChild(resetBtn);
  document.querySelector('.site-header').after(bar);
}

// Auto-set to today if within the month
function initToday() {
  const now = new Date();
  currentMonthKey = buildMonthKey(now.getFullYear(), now.getMonth());
  today = now;
  const d = now.getDate();
  selectedDay = (d >= 1 && d <= 30) ? d - 1 : 0;
  loadFromStorage();
}

// ========== RENDER ==========
function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  const weeks = ['Week 1 (Days 1–7)','Week 2 (Days 8–14)','Week 3 (Days 15–21)','Week 4 (Days 22–30)'];
  nav.innerHTML = weeks.map((w,i) => {
    const active = Math.floor(selectedDay/7) === i ? 'active' : '';
    return `<div class="week-tab ${active}" onclick="scrollToWeek(${i})">${w}</div>`;
  }).join('');
}

function scrollToWeek(weekIdx) {
  const firstDay = weekIdx * 7;
  selectedDay = firstDay;
  renderAll();
  document.querySelector('.day-grid-wrap').scrollIntoView({behavior:'smooth'});
}

function getDayName(dayIndex) {
  // Day 1 = start from a Monday
  // We treat day 0 as Monday
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return dayNames[dayIndex % 7];
}

function getDayNameFull(dayIndex) {
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  return dayNames[dayIndex % 7];
}

function isToday(dayIndex) {
  return dayIndex === (today.getDate() - 1) && today.getMonth() === new Date().getMonth();
}

function getEmoji(dayIndex) {
  const emojis = ['🥚','🐟','🥗','🥕','🍌','🌿','🍲','🥩','🥑','🥦','🍳','🌾','🐠','🥛','🍠','🫐','🥬','🍋','🧄','🫚','🍅','🌱','🥜','🫗','🍓','🥝','🌾','🐟','🥗','🎉'];
  return emojis[dayIndex % emojis.length];
}

function renderGrid() {
  const container = document.getElementById('dayGridContainer');
  const weeks = [
    { label: 'Week 1', days: [0,1,2,3,4,5,6] },
    { label: 'Week 2', days: [7,8,9,10,11,12,13] },
    { label: 'Week 3', days: [14,15,16,17,18,19,20] },
    { label: 'Week 4', days: [21,22,23,24,25,26,27,28,29] }
  ];

  container.innerHTML = weeks.map(week => `
    <div class="week-label">${week.label}</div>
    <div class="day-grid">
      ${week.days.map(i => {
        const active = i === selectedDay ? 'active' : '';
        const todayClass = isToday(i) ? 'today-chip' : '';
        return `<div class="day-chip ${active} ${todayClass}" onclick="selectDay(${i})">
          <div class="chip-num">${i+1}</div>
          <div class="chip-name">${getDayName(i)}</div>
          <div class="chip-emoji">${getEmoji(i)}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderContent() {
  const d = mealTemplates[selectedDay];
  const dayNum = selectedDay + 1;
  const dayName = getDayNameFull(selectedDay);
  const todayLabel = isToday(selectedDay) ? ' — Today' : '';

  const pillColors = ['npill-green','npill-terr','npill-gold'];

  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="day-hero">
      <div class="hero-top">
        <div>
          <div class="hero-date-label">Day ${dayNum} / 30${todayLabel}</div>
          <h2 class="hero-day-name">${dayNum <= 7 ? dayName : dayName}<br><em>${getEmoji(selectedDay)}</em></h2>
        </div>
        <div class="hero-focus">
          <div class="focus-label">Today's focus</div>
          <div class="focus-text">${d.focus}</div>
        </div>
      </div>
      <div class="nutrient-pills">
        ${d.nutrients.map((n,i) => `<span class="npill ${pillColors[i%3]}">${n}</span>`).join('')}
      </div>
    </div>

    <div class="meals-grid">
      ${d.meals.map(m => `
        <div class="meal-card ${m.type}">
          <span class="meal-type-tag tag-${m.type[0]}">${m.type.charAt(0).toUpperCase()+m.type.slice(1)}</span>
          <div class="meal-title">${m.title}</div>
          <ul class="meal-items">
            ${m.items.map(item => `<li>${item}</li>`).join('')}
          </ul>
        </div>
      `).join('')}
    </div>

    <div class="tip-box">
      <div class="tip-label">💡 Today's reminder</div>
      <div class="tip-text">${d.tip}</div>
    </div>

    <div class="habit-row">
      <div class="habit-card">
        <div class="habit-label">💧 Water today (8 cups goal)</div>
        <div class="cups-row">
          ${[0,1,2,3,4,5,6,7].map(i => {
            const filled = (waterFilled[selectedDay] || 0) > i;
            return `<button class="cup-btn ${filled ? 'filled' : ''}" onclick="toggleWater(${i})" title="Cup ${i+1}">
              ${filled ? '💧' : '○'}
            </button>`;
          }).join('')}
        </div>
      </div>
      <div class="habit-card">
        <div class="habit-label">☕ Coffee today (max 1 cup)</div>
        <div class="coffee-note" style="margin-bottom:8px;">Only after food. Never on empty stomach.</div>
        <div class="coffee-cups">
          ${[0,1,2].map(i => {
            const filled = (coffeeFilled[selectedDay] || 0) > i;
            const color = i === 0 ? 'rgba(201,149,74,0.2)' : 'rgba(196,112,74,0.15)';
            return `<button class="coffee-btn ${filled ? 'filled' : ''}" onclick="toggleCoffee(${i})" 
              style="${!filled ? `background:${color}` : ''}" title="${i===0 ? '1 cup (OK)' : i===1 ? '2 cups (too much)' : '3 cups (stop!)'}">
              ${filled ? '☕' : '○'}
            </button>`;
          }).join('')}
        </div>
        <div class="coffee-note" style="margin-top:6px; color:${(coffeeFilled[selectedDay]||0) > 1 ? 'var(--terracotta)' : 'var(--text-muted)'}">
          ${(coffeeFilled[selectedDay]||0) === 0 ? 'No coffee yet — good morning!' : (coffeeFilled[selectedDay]||0) === 1 ? '1 cup — perfect limit ✓' : (coffeeFilled[selectedDay]||0) === 2 ? '2 cups — try to stop here' : '3 cups — your stomach is not happy'}
        </div>
      </div>
    </div>
  `;

  document.getElementById('dayCounter').textContent = `Day ${dayNum} of 30`;
  document.getElementById('prevBtn').disabled = selectedDay === 0;
  document.getElementById('nextBtn').disabled = selectedDay === 29;
}

function renderAll() {
  renderWeekNav();
  renderGrid();
  renderContent();
}

function selectDay(i) {
  selectedDay = i;
  renderAll();
  document.querySelector('.content-area').scrollIntoView({behavior:'smooth', block:'start'});
}

function navigate(dir) {
  const newDay = selectedDay + dir;
  if (newDay >= 0 && newDay <= 29) {
    selectedDay = newDay;
    renderAll();
    document.querySelector('.content-area').scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function goToday() {
  const d = new Date().getDate();
  if (d >= 1 && d <= 30) {
    selectedDay = d - 1;
    renderAll();
    document.querySelector('.content-area').scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function toggleWater(cup) {
  const current = waterFilled[selectedDay] || 0;
  waterFilled[selectedDay] = (current === cup + 1) ? cup : cup + 1;
  saveToStorage();
  renderContent();
}

function toggleCoffee(cup) {
  const current = coffeeFilled[selectedDay] || 0;
  coffeeFilled[selectedDay] = (current === cup + 1) ? cup : cup + 1;
  saveToStorage();
  renderContent();
}

// ========== INIT ==========
initToday();
renderMonthSelector();
renderAll();
</script>
</body>
</html>
