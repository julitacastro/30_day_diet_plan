<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhuls — My Nourishment & Movement Plan 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FDF8F2; --warm-white:#FEFCF9;
  --brown-deep:#3D2B1F; --brown-mid:#6B4A35; --brown-light:#A67C5B;
  --terracotta:#C4704A; --terracotta-light:#E8A882;
  --sage:#7A9E7E; --sage-light:#B8D4BA; --sage-pale:#EDF5EE;
  --gold:#C9954A; --gold-pale:#FBF0DE;
  --blush:#E8C4B0; --violet:#8B7BB5; --violet-pale:#F0EEF9;
  --text-dark:#2C1A0E; --text-mid:#6B4A35; --text-muted:#A67C5B;
  --border:rgba(166,124,91,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background-color:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text-dark);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(196,112,74,.06) 0%,transparent 50%),radial-gradient(ellipse at 90% 80%,rgba(122,158,126,.07) 0%,transparent 50%);}

/* HEADER */
.site-header{text-align:center;padding:2.5rem 2rem 1.5rem;position:relative;overflow:hidden;}
.site-header::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(196,112,74,.12) 0%,transparent 70%);pointer-events:none;}
.greeting{font-size:.78rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--terracotta);margin-bottom:.4rem;}
.site-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3rem);color:var(--brown-deep);line-height:1.1;margin-bottom:.4rem;}
.site-title em{font-style:italic;color:var(--terracotta);}
.site-sub{font-size:.85rem;color:var(--text-muted);font-weight:300;margin-bottom:1.5rem;}
.today-banner{display:inline-flex;align-items:center;gap:8px;background:var(--brown-deep);color:var(--cream);padding:.45rem 1.2rem;border-radius:50px;font-size:.82rem;font-weight:500;cursor:pointer;transition:background .2s;}
.today-banner:hover{background:var(--terracotta);}
.today-dot{width:7px;height:7px;background:var(--terracotta-light);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* MONTH SELECTOR BAR */
#monthSelectorBar{text-align:center;padding:.6rem 1rem 0;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
#monthSelectorBar span{font-size:.75rem;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.1em;}
#monthSelect{font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;color:var(--brown-deep);background:var(--warm-white);border:1px solid var(--border);border-radius:50px;padding:5px 14px;cursor:pointer;outline:none;appearance:none;}
.reset-btn{font-family:'DM Sans',sans-serif;font-size:.72rem;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:50px;padding:4px 12px;cursor:pointer;}

/* WEEK NAV */
.month-nav{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:.75rem 1rem .25rem;}
.week-tab{padding:4px 13px;border:1px solid var(--border);border-radius:50px;font-size:.75rem;cursor:pointer;background:var(--warm-white);color:var(--text-muted);transition:all .2s;font-weight:500;}
.week-tab:hover{border-color:var(--terracotta);color:var(--terracotta);}
.week-tab.active{background:var(--terracotta);border-color:var(--terracotta);color:white;}

/* DAY GRID */
.day-grid-wrap{max-width:980px;margin:0 auto;padding:1rem 1.5rem 1.5rem;}
.week-label{font-family:'Playfair Display',serif;font-size:1rem;color:var(--brown-light);margin:1.2rem 0 .6rem;font-style:italic;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day-chip{background:var(--warm-white);border:1px solid var(--border);border-radius:10px;padding:.45rem .25rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.day-chip:hover{border-color:var(--terracotta);transform:translateY(-2px);box-shadow:0 4px 12px rgba(196,112,74,.15);}
.day-chip.active{background:var(--brown-deep);border-color:var(--brown-deep);color:white;box-shadow:0 6px 18px rgba(61,43,31,.25);transform:translateY(-2px);}
.day-chip.today-chip{border-color:var(--terracotta);}
.day-chip.today-chip::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--terracotta);border-radius:50%;}
.day-chip.active.today-chip::after{background:var(--terracotta-light);}
.chip-num{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;line-height:1;}
.chip-name{font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;opacity:.6;margin-top:2px;}
.chip-emoji{font-size:.78rem;margin-top:2px;}

/* CONTENT */
.content-area{max-width:840px;margin:0 auto;padding:0 1.5rem 4rem;}

/* TABS: Diet / Exercise */
.section-tabs{display:flex;gap:8px;margin-bottom:1.25rem;}
.sec-tab{flex:1;padding:.6rem 1rem;border-radius:12px;border:1px solid var(--border);background:var(--warm-white);color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;}
.sec-tab.active{background:var(--brown-deep);border-color:var(--brown-deep);color:white;}
.sec-tab:hover:not(.active){border-color:var(--terracotta);color:var(--terracotta);}

/* DAY HERO */
.day-hero{background:var(--warm-white);border:1px solid var(--border);border-radius:22px;padding:1.75rem 1.75rem 1.25rem;margin-bottom:1.25rem;position:relative;overflow:hidden;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.day-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(196,112,74,.09) 0%,transparent 70%);}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;}
.hero-date-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:3px;}
.hero-day-name{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.2rem);color:var(--brown-deep);line-height:1;}
.hero-day-name em{font-style:italic;color:var(--terracotta);}
.hero-focus{background:var(--gold-pale);border:1px solid rgba(201,149,74,.25);border-radius:12px;padding:.65rem .9rem;min-width:150px;text-align:right;flex-shrink:0;}
.focus-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:3px;}
.focus-text{font-size:.82rem;font-weight:500;color:var(--brown-deep);}
.nutrient-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;}
.npill{padding:2px 9px;border-radius:50px;font-size:.68rem;font-weight:500;border:1px solid;}
.npill-green{background:var(--sage-pale);color:var(--sage);border-color:rgba(122,158,126,.3);}
.npill-terr{background:rgba(232,168,130,.2);color:var(--terracotta);border-color:rgba(196,112,74,.25);}
.npill-gold{background:var(--gold-pale);color:var(--gold);border-color:rgba(201,149,74,.25);}

/* MEAL CARDS */
.meals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
@media(max-width:560px){.meals-grid{grid-template-columns:1fr;}}
.meal-card{border-radius:16px;padding:1.1rem;position:relative;overflow:hidden;animation:fadeIn .4s ease;}
.meal-card.breakfast{background:linear-gradient(135deg,#FBF0DE 0%,#FDF8F2 100%);border:1px solid rgba(201,149,74,.2);}
.meal-card.lunch{background:linear-gradient(135deg,#EDF5EE 0%,#FDF8F2 100%);border:1px solid rgba(122,158,126,.2);}
.meal-card.snack{background:linear-gradient(135deg,rgba(232,168,130,.15) 0%,#FDF8F2 100%);border:1px solid rgba(196,112,74,.2);}
.meal-card.dinner{background:linear-gradient(135deg,rgba(61,43,31,.05) 0%,#FDF8F2 100%);border:1px solid rgba(61,43,31,.12);}
.meal-type-tag{display:inline-block;font-size:.63rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border-radius:50px;margin-bottom:.5rem;}
.tag-b{background:var(--gold);color:white;}.tag-l{background:var(--sage);color:white;}.tag-s{background:var(--terracotta);color:white;}.tag-d{background:var(--brown-deep);color:var(--cream);}
.meal-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--brown-deep);margin-bottom:.5rem;line-height:1.2;}
.meal-items{list-style:none;}
.meal-items li{font-size:.8rem;color:var(--text-mid);padding:2px 0;display:flex;align-items:flex-start;gap:5px;line-height:1.4;font-weight:300;}
.meal-items li::before{content:'—';color:var(--text-muted);flex-shrink:0;font-weight:300;}

/* PREP TOGGLE */
.prep-toggle{margin-top:.75rem;width:100%;background:transparent;border:1px dashed rgba(166,124,91,.35);border-radius:8px;padding:.45rem .75rem;font-size:.75rem;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;transition:all .15s;}
.prep-toggle:hover{border-color:var(--terracotta);color:var(--terracotta);}
.prep-body{display:none;margin-top:.6rem;background:rgba(255,255,255,.6);border-radius:8px;padding:.7rem .8rem;}
.prep-body.open{display:block;animation:fadeIn .2s ease;}
.prep-step{font-size:.78rem;color:var(--text-mid);padding:3px 0;display:flex;gap:8px;line-height:1.45;font-weight:300;}
.prep-num{font-weight:600;color:var(--terracotta);flex-shrink:0;font-size:.75rem;}
.prep-time{font-size:.68rem;color:var(--text-muted);margin-top:.4rem;font-style:italic;}

/* TIP BOX */
.tip-box{background:var(--sage-pale);border-left:3px solid var(--sage);border-radius:0 12px 12px 0;padding:.9rem 1.1rem;margin-bottom:1.1rem;animation:fadeIn .5s ease;}
.tip-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sage);margin-bottom:3px;font-weight:500;}
.tip-text{font-size:.85rem;color:var(--text-mid);line-height:1.6;font-weight:300;}

/* HABIT ROW */
.habit-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
@media(max-width:480px){.habit-row{grid-template-columns:1fr;}}
.habit-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:.9rem;}
.habit-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.55rem;font-weight:500;}
.cups-row{display:flex;gap:4px;flex-wrap:wrap;}
.cup-btn{width:28px;height:33px;border-radius:0 0 7px 7px;border:1.5px solid rgba(122,158,126,.4);background:transparent;cursor:pointer;font-size:.65rem;transition:all .15s;display:flex;align-items:center;justify-content:center;color:var(--sage);}
.cup-btn.filled{background:var(--sage);color:white;border-color:var(--sage);}
.coffee-cups{display:flex;gap:5px;margin-top:6px;}
.coffee-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(196,112,74,.3);background:transparent;cursor:pointer;font-size:.9rem;transition:all .15s;}
.coffee-btn.filled{background:var(--terracotta);border-color:var(--terracotta);}
.coffee-note{font-size:.68rem;color:var(--text-muted);margin-top:4px;}

/* ===== EXERCISE SECTION ===== */
.exercise-section{animation:fadeIn .3s ease;}
.exercise-header{background:var(--warm-white);border:1px solid var(--border);border-radius:22px;padding:1.5rem 1.75rem;margin-bottom:1.25rem;}
.ex-day-type{display:inline-block;padding:.3rem .9rem;border-radius:50px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem;}
.ex-full{background:#EDF5EE;color:var(--sage);}
.ex-upper{background:rgba(232,168,130,.2);color:var(--terracotta);}
.ex-lower{background:var(--violet-pale);color:var(--violet);}
.ex-rest{background:var(--gold-pale);color:var(--gold);}
.ex-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--brown-deep);margin-bottom:.3rem;}
.ex-subtitle{font-size:.82rem;color:var(--text-muted);font-weight:300;}
.ex-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:.85rem;}
.ex-stat{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:.4rem .8rem;font-size:.75rem;color:var(--text-mid);font-weight:500;}

.ex-circuit{background:var(--warm-white);border:1px solid var(--border);border-radius:18px;padding:1.25rem;margin-bottom:1rem;}
.ex-circuit-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:500;margin-bottom:.8rem;}
.ex-circuit-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--brown-deep);margin-bottom:.9rem;}
.exercise-item{display:grid;grid-template-columns:auto 1fr auto;gap:.75rem;align-items:start;padding:.7rem 0;border-bottom:1px solid var(--border);}
.exercise-item:last-child{border-bottom:none;}
.ex-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.ex-icon-full{background:#EDF5EE;}
.ex-icon-upper{background:rgba(232,168,130,.2);}
.ex-icon-lower{background:var(--violet-pale);}
.ex-icon-core{background:var(--gold-pale);}
.ex-name{font-size:.88rem;font-weight:500;color:var(--brown-deep);margin-bottom:2px;}
.ex-desc{font-size:.75rem;color:var(--text-muted);font-weight:300;line-height:1.4;}
.ex-reps{font-size:.78rem;font-weight:600;color:var(--terracotta);white-space:nowrap;text-align:right;}

.warmup-box{background:var(--gold-pale);border:1px solid rgba(201,149,74,.2);border-radius:14px;padding:.9rem 1.1rem;margin-bottom:1rem;}
.warmup-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-weight:500;margin-bottom:.5rem;}
.warmup-items{display:flex;flex-wrap:wrap;gap:6px;}
.warmup-item{background:white;border:1px solid rgba(201,149,74,.2);border-radius:8px;padding:.3rem .7rem;font-size:.75rem;color:var(--text-mid);}

.rest-box{background:var(--gold-pale);border:1px solid rgba(201,149,74,.2);border-radius:18px;padding:1.75rem;text-align:center;margin-bottom:1rem;}
.rest-emoji{font-size:2.5rem;margin-bottom:.75rem;}
.rest-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--brown-deep);margin-bottom:.5rem;}
.rest-desc{font-size:.85rem;color:var(--text-mid);line-height:1.6;font-weight:300;}
.rest-activities{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:1rem;}
.rest-activity{background:white;border:1px solid rgba(201,149,74,.2);border-radius:50px;padding:.35rem .9rem;font-size:.78rem;color:var(--text-mid);}

/* NAV */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.nav-btn{display:flex;align-items:center;gap:5px;background:var(--warm-white);border:1px solid var(--border);padding:.45rem .9rem;border-radius:50px;cursor:pointer;font-size:.8rem;color:var(--text-mid);font-family:'DM Sans',sans-serif;transition:all .2s;}
.nav-btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
.nav-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.day-counter{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--text-muted);font-style:italic;}

/* FOOTER */
.site-footer{text-align:center;padding:2rem;font-size:.75rem;color:var(--text-muted);font-weight:300;}
.site-footer strong{color:var(--terracotta);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--cream);}
::-webkit-scrollbar-thumb{background:var(--blush);border-radius:3px;}
</style>
</head>
<body>

<header class="site-header">
  <div class="greeting">Your personal nourishment & movement journal</div>
  <h1 class="site-title">Good food, strong body,<br><em>Jhuls.</em></h1>
  <p class="site-sub">Strength · Eye health · Circulation · Calm gut · Clear mind</p>
  <div class="today-banner" onclick="goToday()">
    <div class="today-dot"></div>
    <span>Jump to Today</span>
  </div>
</header>

<div id="monthSelectorBar"></div>
<div class="month-nav" id="weekNav"></div>
<div class="day-grid-wrap"><div id="dayGridContainer"></div></div>

<div class="content-area">
  <div class="day-nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Prev</button>
    <span class="day-counter" id="dayCounter"></span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
  </div>
  <div class="section-tabs">
    <button class="sec-tab active" id="tabDiet" onclick="switchTab('diet')">🥗 Diet Plan</button>
    <button class="sec-tab" id="tabExercise" onclick="switchTab('exercise')">💪 Exercise</button>
  </div>
  <div id="mainContent"></div>
</div>

<footer class="site-footer">
  Made with care 🌿 &nbsp;|&nbsp; <strong>Remember:</strong> water first, coffee second. &nbsp;|&nbsp; Please see a doctor for your eye & calf concerns.
</footer>

// ============================

    cooldown:'Final upper body stretch. Full chest, shoulder, bicep, tricep. 8 minutes minimum. You worked these muscles for 30 days. Give them a proper goodbye.'
  },
  { type:'rest', title:'Day 30 — Celebrate & Rest 🎉', subtitle:'30 days done. Rest is your reward today.', duration:'Rest', level:'You earned it',
    warmup:[], circuits:[],
    restActivities:['No exercise today — pure rest','A gentle walk if you feel like it','Stretch anything that\'s still sore','Write down your measurements or fitness observations','Plan next month — what to add, what to keep','Go to sleep early and sleep well'],
    cooldown:''
  }
];

// ============================
// STATE
// ============================
let today = new Date();
let selectedDay = 0;
let currentMonthKey = '';
let waterFilled = {};
let coffeeFilled = {};
let activeTab = 'diet'; // 'diet' or 'exercise'

// ============================
// STORAGE
// ============================
function getStorageKey(type){ return `jhuls_plan_${currentMonthKey}_${type}`; }
function saveToStorage(){
  try{ localStorage.setItem(getStorageKey('water'), JSON.stringify(waterFilled)); localStorage.setItem(getStorageKey('coffee'), JSON.stringify(coffeeFilled)); }catch(e){}
}
function loadFromStorage(){
  try{
    const w = localStorage.getItem(getStorageKey('water'));
    const c = localStorage.getItem(getStorageKey('coffee'));
    waterFilled = w ? JSON.parse(w) : {};
    coffeeFilled = c ? JSON.parse(c) : {};
  }catch(e){ waterFilled={}; coffeeFilled={}; }
}

// ============================
// MONTH SELECTOR
// ============================
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function buildMonthKey(y,m){ return `${y}_${String(m+1).padStart(2,'0')}`; }

function renderMonthSelector(){
  const bar = document.getElementById('monthSelectorBar');
  bar.innerHTML = '';
  const label = document.createElement('span'); label.textContent = 'Plan for month:'; bar.appendChild(label);
  const sel = document.createElement('select'); sel.id = 'monthSelect';
  const now = new Date();
  for(let offset=-2; offset<=6; offset++){
    const d = new Date(now.getFullYear(), now.getMonth()+offset, 1);
    const key = buildMonthKey(d.getFullYear(), d.getMonth());
    const opt = document.createElement('option'); opt.value = key;
    opt.textContent = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
    if(key===currentMonthKey) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', ()=>{
    saveToStorage();
    currentMonthKey = sel.value;
    const parts = currentMonthKey.split('_');
    const sY=parseInt(parts[0]), sM=parseInt(parts[1])-1;
    const rn = new Date();
    today = (rn.getFullYear()===sY && rn.getMonth()===sM) ? rn : new Date(sY, sM, 0);
    loadFromStorage();
    const d = new Date(sY, sM, 1);
    selectedDay = 0;
    renderAll();
  });
  bar.appendChild(sel);
  const rst = document.createElement('button'); rst.className='reset-btn'; rst.textContent='↺ Reset month';
  rst.addEventListener('click',()=>{
    if(confirm('Reset tracking for this month? Cannot be undone.')){ waterFilled={}; coffeeFilled={}; saveToStorage(); renderContent(); }
  });
  bar.appendChild(rst);
}

// ============================
// DATE HELPERS
// Get real day name from selected month + day index
// ============================
function getDayInfo(dayIndex){
  const parts = currentMonthKey.split('_');
  const y = parseInt(parts[0]), m = parseInt(parts[1])-1;
  const date = new Date(y, m, dayIndex+1); // day index 0 = 1st of month
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayNamesFull = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return { dayName: dayNames[date.getDay()], dayNameFull: dayNamesFull[date.getDay()], date: date };
}

function isToday(dayIndex){
  const { date } = getDayInfo(dayIndex);
  const now = new Date();
  return date.getDate()===now.getDate() && date.getMonth()===now.getMonth() && date.getFullYear()===now.getFullYear();
}

function getEmoji(dayIndex){
  const emojis=['🥚','🐟','🥗','🥕','🍌','🌿','🍲','🥩','🥑','🥦','🍳','🌾','🐠','🥛','🍠','🫐','🥬','🍋','🧄','🫚','🍅','🌱','🥜','🫗','🍓','🥝','🌾','🐟','🥗','🎉'];
  return emojis[dayIndex % emojis.length];
}

// ============================
// RENDER — GRID
// ============================
function renderWeekNav(){
  const nav = document.getElementById('weekNav');
  const weeks=['Week 1 (1–7)','Week 2 (8–14)','Week 3 (15–21)','Week 4 (22–30)'];
  nav.innerHTML = weeks.map((w,i)=>{
    const active = Math.floor(selectedDay/7)===i?'active':'';
    return `<div class="week-tab ${active}" onclick="scrollToWeek(${i})">${w}</div>`;
  }).join('');
}

function scrollToWeek(weekIdx){
  selectedDay = weekIdx*7; renderAll();
  document.querySelector('.day-grid-wrap').scrollIntoView({behavior:'smooth'});
}

function renderGrid(){
  const container = document.getElementById('dayGridContainer');
  const weeks=[{label:'Week 1',days:[0,1,2,3,4,5,6]},{label:'Week 2',days:[7,8,9,10,11,12,13]},{label:'Week 3',days:[14,15,16,17,18,19,20]},{label:'Week 4',days:[21,22,23,24,25,26,27,28,29]}];
  container.innerHTML = weeks.map(week=>`
    <div class="week-label">${week.label}</div>
    <div class="day-grid">
      ${week.days.map(i=>{
        const {dayName} = getDayInfo(i);
        const active = i===selectedDay?'active':'';
        const todayClass = isToday(i)?'today-chip':'';
        return `<div class="day-chip ${active} ${todayClass}" onclick="selectDay(${i})">
          <div class="chip-num">${i+1}</div>
          <div class="chip-name">${dayName}</div>
          <div class="chip-emoji">${getEmoji(i)}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// ============================
// RENDER — DIET CONTENT
// ============================
function renderDietContent(){
  const d = mealTemplates[selectedDay];
  const {dayName, dayNameFull} = getDayInfo(selectedDay);
  const dayNum = selectedDay+1;
  const todayLabel = isToday(selectedDay)?' — Today':'';
  const pillColors=['npill-green','npill-terr','npill-gold'];

  let mealsHTML = d.meals.map(m=>{
    const prepSteps = m.prep.map((step,i)=>`<div class="prep-step"><span class="prep-num">${i+1}.</span><span>${step}</span></div>`).join('');
    return `<div class="meal-card ${m.type}">
      <span class="meal-type-tag tag-${m.type[0]}">${m.type.charAt(0).toUpperCase()+m.type.slice(1)}</span>
      <div class="meal-title">${m.title}</div>
      <ul class="meal-items">${m.items.map(item=>`<li>${item}</li>`).join('')}</ul>
      <button class="prep-toggle" onclick="togglePrep(this)">🍳 How to prepare ↓</button>
      <div class="prep-body">
        ${prepSteps}
        <div class="prep-time">⏱ Prep time: ${m.prepTime}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="day-hero">
      <div class="hero-top">
        <div>
          <div class="hero-date-label">Day ${dayNum} / 30 — ${dayNameFull}${todayLabel}</div>
          <h2 class="hero-day-name">${dayNameFull}<br><em>${getEmoji(selectedDay)}</em></h2>
        </div>
        <div class="hero-focus"><div class="focus-label">Today's focus</div><div class="focus-text">${d.focus}</div></div>
      </div>
      <div class="nutrient-pills">${d.nutrients.map((n,i)=>`<span class="npill ${pillColors[i%3]}">${n}</span>`).join('')}</div>
    </div>
    <div class="meals-grid">${mealsHTML}</div>
    <div class="tip-box"><div class="tip-label">💡 Today's reminder</div><div class="tip-text">${d.tip}</div></div>
    <div class="habit-row">
      <div class="habit-card">
        <div class="habit-label">💧 Water today (8 cups goal)</div>
        <div class="cups-row">
          ${[0,1,2,3,4,5,6,7].map(i=>{
            const filled=(waterFilled[selectedDay]||0)>i;
            return `<button class="cup-btn ${filled?'filled':''}" onclick="toggleWater(${i})">${filled?'💧':'○'}</button>`;
          }).join('')}
        </div>
      </div>
      <div class="habit-card">
        <div class="habit-label">☕ Coffee (max 1 cup)</div>
        <div class="coffee-note" style="margin-bottom:6px;">Only after food. Never on empty stomach.</div>
        <div class="coffee-cups">
          ${[0,1,2].map(i=>{
            const filled=(coffeeFilled[selectedDay]||0)>i;
            return `<button class="coffee-btn ${filled?'filled':''}" onclick="toggleCoffee(${i})">${filled?'☕':'○'}</button>`;
          }).join('')}
        </div>
        <div class="coffee-note" style="margin-top:5px;color:${(coffeeFilled[selectedDay]||0)>1?'var(--terracotta)':'var(--text-muted)'}">
          ${(coffeeFilled[selectedDay]||0)===0?'No coffee yet — good morning!':(coffeeFilled[selectedDay]||0)===1?'1 cup — perfect ✓':(coffeeFilled[selectedDay]||0)===2?'2 cups — stop here':'3 cups — your stomach is unhappy'}
        </div>
      </div>
    </div>`;
}

// ============================
// RENDER — EXERCISE CONTENT
// ============================
function renderExerciseContent(){
  const ex = exercisePlans[selectedDay % exercisePlans.length];
  const {dayNameFull} = getDayInfo(selectedDay);
  const dayNum = selectedDay+1;
  const typeLabels = {full:'Full Body 💪',upper:'Upper Body 🦾',lower:'Lower Body 🦵',rest:'Rest Day 🌿'};
  const typeClasses = {full:'ex-full',upper:'ex-upper',lower:'ex-lower',rest:'ex-rest'};

  if(ex.type==='rest'){
    return `<div class="exercise-section">
      <div class="exercise-header">
        <span class="ex-day-type ${typeClasses[ex.type]}">${typeLabels[ex.type]}</span>
        <div class="ex-title">${ex.title}</div>
        <div class="ex-subtitle">${ex.subtitle}</div>
      </div>
      <div class="rest-box">
        <div class="rest-emoji">😴</div>
        <div class="rest-title">Rest & Recover</div>
        <div class="rest-desc">Rest days are when your muscles actually grow and repair. Skipping rest is why people plateau. Today you are training — just differently.</div>
        <div class="rest-activities">
          ${ex.restActivities.map(a=>`<div class="rest-activity">✓ ${a}</div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  const warmupHTML = ex.warmup && ex.warmup.length ? `
    <div class="warmup-box">
      <div class="warmup-label">🔥 Warm-up first (5 mins)</div>
      <div class="warmup-items">${ex.warmup.map(w=>`<div class="warmup-item">${w}</div>`).join('')}
      </div>
    </div>` : '';

  const circuitsHTML = ex.circuits.map(circuit=>`
    <div class="ex-circuit">
      <div class="ex-circuit-label">${circuit.label}</div>
      <div class="ex-circuit-title">${circuit.title}</div>
      ${circuit.exercises.map(e=>`
        <div class="exercise-item">
          <div class="ex-icon ${e.iconClass}">${e.icon}</div>
          <div>
            <div class="ex-name">${e.name}</div>
            <div class="ex-desc">${e.desc}</div>
          </div>
          <div class="ex-reps">${e.reps}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const cooldownHTML = ex.cooldown ? `
    <div class="tip-box" style="background:var(--violet-pale);border-color:var(--violet);">
      <div class="tip-label" style="color:var(--violet);">🧘 Cool-down</div>
      <div class="tip-text">${ex.cooldown}</div>
    </div>` : '';

  return `<div class="exercise-section">
    <div class="exercise-header">
      <span class="ex-day-type ${typeClasses[ex.type]}">${typeLabels[ex.type]}</span>
      <div class="ex-title">${ex.title}</div>
      <div class="ex-subtitle">${ex.subtitle}</div>
      <div class="ex-stats">
        <span class="ex-stat">⏱ ${ex.duration}</span>
        <span class="ex-stat">📊 ${ex.level}</span>
        <span class="ex-stat">📅 Day ${dayNum}</span>
      </div>
    </div>
    ${warmupHTML}
    ${circuitsHTML}
    ${cooldownHTML}
  </div>`;
}

// ============================
// RENDER — MAIN
// ============================
function renderContent(){
  const content = document.getElementById('mainContent');
  content.innerHTML = activeTab==='diet' ? renderDietContent() : renderExerciseContent();
  document.getElementById('dayCounter').textContent = `Day ${selectedDay+1} of 30`;
  document.getElementById('prevBtn').disabled = selectedDay===0;
  document.getElementById('nextBtn').disabled = selectedDay===29;
}

function renderAll(){
  renderWeekNav(); renderGrid(); renderContent();
}

// ============================
// INTERACTIONS
// ============================
function selectDay(i){
  selectedDay=i; renderAll();
  document.querySelector('.content-area').scrollIntoView({behavior:'smooth',block:'start'});
}
function navigate(dir){
  const n=selectedDay+dir;
  if(n>=0 && n<=29){ selectedDay=n; renderAll(); document.querySelector('.content-area').scrollIntoView({behavior:'smooth',block:'start'}); }
}
function goToday(){
  const parts = currentMonthKey.split('_');
  const now = new Date();
  const sY=parseInt(parts[0]), sM=parseInt(parts[1])-1;
  if(now.getFullYear()===sY && now.getMonth()===sM){
    selectedDay = now.getDate()-1;
    if(selectedDay>29) selectedDay=29;
    renderAll();
    document.querySelector('.content-area').scrollIntoView({behavior:'smooth',block:'start'});
  }
}
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabDiet').className='sec-tab'+(tab==='diet'?' active':'');
  document.getElementById('tabExercise').className='sec-tab'+(tab==='exercise'?' active':'');
  renderContent();
}
function togglePrep(btn){
  const body = btn.nextElementSibling;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '🍳 How to prepare ↓' : '🍳 Hide preparation ↑';
}
function toggleWater(cup){
  const cur=waterFilled[selectedDay]||0;
  waterFilled[selectedDay]=(cur===cup+1)?cup:cup+1;
  saveToStorage(); renderContent();
}
function toggleCoffee(cup){
  const cur=coffeeFilled[selectedDay]||0;
  coffeeFilled[selectedDay]=(cur===cup+1)?cup:cup+1;
  saveToStorage(); renderContent();
}

// ============================
// INIT
// ============================
function init(){
  const now = new Date();
  currentMonthKey = buildMonthKey(now.getFullYear(), now.getMonth());
  today = now;
  selectedDay = Math.min(now.getDate()-1, 29);
  loadFromStorage();
  renderMonthSelector();
  renderAll();
}

init();
</script>
</body>
</html>
