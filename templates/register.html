{% extends "base.html" %}
{% block title %}Register — Jhuls Health Tracker{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:3rem;font-style:italic;color:var(--terracotta);">Jhuls</div>
      <div style="font-size:.8rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted);">Health & Nourishment Tracker</div>
    </div>
    <div class="card">
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--brown-deep);margin-bottom:1.5rem;">Create your account 🌱</h2>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Your name</label>
          <input type="text" name="name" class="form-input" placeholder="Jhuls" value="Jhuls" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Choose a strong password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;">Create account</button>
      </form>
    </div>
    <p style="text-align:center;margin-top:1rem;font-size:.8rem;color:var(--text-muted);">
      Already registered? <a href="/login" style="color:var(--terracotta);">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
