{% extends "base.html" %}
{% block title %}Login — Jhuls Health Tracker{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 30% 40%,rgba(196,112,74,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(122,158,126,.08) 0%,transparent 60%);">
  <div style="width:100%;max-width:420px;">

    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:3rem;font-style:italic;color:var(--terracotta);line-height:1;margin-bottom:.5rem;">Jhuls</div>
      <div style="font-size:.8rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted);">Health & Nourishment Tracker</div>
    </div>

    <div class="card">
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--brown-deep);margin-bottom:1.5rem;">Welcome back 🌿</h2>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="your@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;">Sign in</button>
      </form>
    </div>

    <p style="text-align:center;margin-top:1rem;font-size:.8rem;color:var(--text-muted);">
      First time? <a href="/register" style="color:var(--terracotta);">Create your account</a>
    </p>
  </div>
</div>
{% endblock %}
